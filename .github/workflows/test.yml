name: TDR Run Tests
on:
  pull_request:
  push:
    branches-ignore:
      - master
      - release-*
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@c0b42964f83e17530bde64ce2c987a4c355f7fe7 # v.0.0.19
    permissions:
      contents: write
    with:
      repo-name: tdr-auth-utils
      test-command: |
        sbt test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
